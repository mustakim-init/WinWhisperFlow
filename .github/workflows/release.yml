name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python venv
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\pip install "numpy<2.0.0"
          .\.venv\Scripts\pip install -r stt_engine\requirements.txt
          .\.venv\Scripts\pip install demucs
          .\.venv\Scripts\pip install pyinstaller

      - name: Build Python sidecar
        run: .\scripts\build-python.ps1

      - name: Build WebUI
        working-directory: WebUI
        run: |
          npm ci
          npm run build

      - name: Publish .NET app
        run: |
          dotnet publish WinWhisperFlow.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o artifacts\publish\WinWhisperFlow

      - name: Create portable zip
        run: |
          Compress-Archive -Path artifacts\publish\WinWhisperFlow\* -DestinationPath artifacts\WinWhisperFlow-portable.zip

      - name: Install Inno Setup
        run: |
          curl -sL "https://jrsoftware.org/download.php/is.exe" -o "$env:TEMP\innosetup.exe"
          Start-Process -Wait -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-"
          # Wait for installation and find ISCC.exe
          $retries = 10
          while ($retries -gt 0) {
            $iscc = Get-Command "iscc" -ErrorAction SilentlyContinue
            if ($iscc) { break }
            $iscc = Get-ChildItem "$env:ProgramFiles (x86)\Inno Setup 6" -Filter "ISCC.exe" -ErrorAction SilentlyContinue
            if ($iscc) { break }
            $iscc = Get-ChildItem "${env:ProgramFiles}\Inno Setup 6" -Filter "ISCC.exe" -ErrorAction SilentlyContinue
            if ($iscc) { break }
            Start-Sleep -Seconds 3
            $retries--
          }

      - name: Build Inno Setup installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\WinWhisperFlow.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          files: |
            artifacts\WinWhisperFlow-portable.zip
            artifacts\installer\WinWhisperFlowSetup.exe
          generate_release_notes: true
