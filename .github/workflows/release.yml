name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python venv
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\pip install -r stt_engine\requirements.txt
          .\.venv\Scripts\pip install demucs
          .\.venv\Scripts\pip install pyinstaller

      - name: Build Python sidecar
        run: .\scripts\build-python.ps1

      - name: Build WebUI
        working-directory: WebUI
        run: |
          npm ci
          npm run build

      - name: Publish .NET app
        run: |
          dotnet publish WinWhisperFlow.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o artifacts\publish\WinWhisperFlow

      - name: Create portable zip
        run: |
          Compress-Archive -Path artifacts\publish\WinWhisperFlow\* -DestinationPath artifacts\WinWhisperFlow-portable.zip

      - name: Setup Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack Velopack release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $ver = "$env:TAG" -replace '^v', ''
          vpk pack -u WinWhisperFlow `
            -v $ver `
            -p artifacts\publish\WinWhisperFlow `
            -o artifacts\vpk `
            -i Icon.ico `
            -e WinWhisperFlow.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts\WinWhisperFlow-portable.zip
            artifacts\vpk\*
          generate_release_notes: true
