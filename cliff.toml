[changelog]
header = """
# Changelog

"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    {{ group }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}{% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/mustakim-init/WinWhisperFlow/commit/{{ commit.id }})){% endif %}
    {% endfor %}

{% endfor %}\
{% if version %}\
    **Full Changelog**: https://github.com/mustakim-init/WinWhisperFlow/commits/{{ version }}
{% endif %}\
"""
trim = true
postprocessors = [
  { pattern = '<REPO>', replace = "https://github.com/mustakim-init/WinWhisperFlow" },
]
render_always = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = [
  { pattern = '\\(#(\\d+)\\)', replace = "(PR: [#$1](<REPO>/pull/$1))" },
]
commit_parsers = [
  { message = "^feat", group = "## 🚀 Features" },
  { message = "^fix", group = "## 🐛 Bug Fixes" },
  { message = "^perf", group = "## ⚡ Performance" },
  { message = "^doc", group = "## 📚 Documentation" },
  { message = "^refactor", group = "## 🔧 Refactoring" },
  { message = "^style", group = "## 🎨 Styling" },
  { message = "^test", group = "## 🧪 Testing" },
  { message = "^ci", group = "## 🤖 CI & Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore", group = "## 🧹 Chores" },
  { message = ".*", group = "## 💼 Other" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"
